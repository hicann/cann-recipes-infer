model_args:
  dit-weight: "/path/to/HunyuanVideo_model_states_fp8.pt"  # must modify: path to FP8-quantized DiT checkpoint
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  use-cpu-offload: true
  use-fp8: true                      # enable FP8 FA activation quantization (950PR only)

model_name: "hunyuan-video"
world_size: 1
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"
  enable_separate_cfg: true
