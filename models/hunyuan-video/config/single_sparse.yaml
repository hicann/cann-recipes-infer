model_args:
  model-base: "ckpts"                # weight root dir; modify if weights are not under models/hunyuan-video/ckpts
  prompt: "A cat walks on the grass, realistic style."
  video-size: [320, 480]             # [H, W]; must match sparse.params.TopK.sparsity_files_path if method=TopK
  video-length: 65                   # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  use-cpu-offload: true             # enabling slows down VAE; required when TaylorSeer cache is enabled

model_name: "hunyuan-video"
world_size: 1                        # single-card sparse; for multi-card sparse use sp8_sparse.yaml
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                  # sparse overrides cache block forwards

sparse:
  method: "SVG"                      # [no_sparse, TopK, SVG]
  block_size_Q: 128
  block_size_K: 512
  model: "HunyuanVideo"
  params:
    TopK:                            # only used when method == TopK; requires offline profiling
      sparse_time_step: "10-49"
      sparsity_files_path: "./sparsity/320x480x65/v3"
      CAC_threshold: 0.66
    SVG:                             # only used when method == SVG
      sparse_time_step: "14-49"
      sparsity: 0.8
      sample_mse_max_row: 5000
      context_length: 256
