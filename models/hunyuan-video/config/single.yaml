model_args:
  model-base: "ckpts"                # weight root dir; modify if weights are not under models/hunyuan-video/ckpts
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]; supported 720*1280, 832*1104, 960*544, etc.
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  use-cpu-offload: true             # enabling slows down VAE; required when TaylorSeer cache is enabled

model_name: "hunyuan-video"
world_size: 1
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                  # [NoCache, FBCache, TeaCache, TaylorSeer]
  enable_separate_cfg: true
  # Uncomment the params block matching the method above; only that block is read.
  # params:
  #   # FBCache:
  #   rel_l1_thresh: 0.05            # L1 diff threshold; larger = faster, less accurate
  #
  #   # TeaCache:
  #   rel_l1_thresh: 0.15            # accumulated L1 threshold
  #   coefficients: [733.226126, -401.131952, 67.5869174, -3.149879, 0.0961237896]
  #   warmup: 2                      # first N steps compute fully
  #
  #   # TaylorSeer (needs 400GB+ host memory when offload=true at 720*1280*129):
  #   n_derivatives: 3               # Taylor expansion order
  #   skip_interval_steps: 4         # full compute every N steps
  #   warmup: 3                      # first N steps compute fully
  #   cutoff_steps: 1                # last N steps compute fully
  #   offload: true
