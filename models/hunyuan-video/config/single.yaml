model_args:
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]; native 720*1280, 832*1104, 960*544 etc.
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0             # CFG guidance strength
  flow-shift: 7.0                     # flow-matching shift
  flow-reverse: true
  use-cpu-offload: true               # required on single card to fit memory

model_name: "hunyuan-video"
world_size: 1
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                   # NoCache / FBCache / TeaCache / TaylorSeer
  enable_separate_cfg: true
