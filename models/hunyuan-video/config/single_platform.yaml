model_args:
  model-base: "ckpts"
  prompt: "A cat walks on the grass, realistic style."
  video-size: [360, 640]           # [H, W]
  video-length: 81                 # 4n+1
  infer-steps: 50
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  use-cpu-offload: true
  save-path: "output/platform_results"

model_name: "hunyuan-video"
world_size: 1
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                  # [NoCache, FBCache, TeaCache, TaylorSeer]
