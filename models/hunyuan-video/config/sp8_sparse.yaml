model_args:
  model-base: "ckpts"                # weight root dir; modify if weights are not under models/hunyuan-video/ckpts
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]; multi-card sparse production spec; if method=TopK, sparsity_files_path must match
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  ulysses-degree: 8                  # Ulysses SP degree; sparse + Ulysses is supported (head-reorder load balance applies)
  ring-degree: 1                     # MUST be 1; sparse + ring_degree>1 raises ValueError in sample_video.py
  use-cpu-offload: true             # enabling slows down VAE
  use-vae-parallel: true             # multi-card VAE split

model_name: "hunyuan-video"
world_size: 8                        # must equal ulysses-degree * ring-degree
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                  # sparse overrides cache block forwards; keep NoCache

sparse:
  method: "SVG"                      # [no_sparse, TopK, SVG]; SVG is the default (no offline profiling required)
  block_size_Q: 128
  block_size_K: 512
  model: "HunyuanVideo"
  params:
    TopK:                            # only used when method == TopK; needs offline profiling matched to video-size/length
      sparse_time_step: "10-49"
      sparsity_files_path: "./sparsity/720x1280x129/v3"
      CAC_threshold: 0.66
    SVG:                             # only used when method == SVG
      sparse_time_step: "14-49"
      sparsity: 0.8
      sample_mse_max_row: 5000
      context_length: 256
