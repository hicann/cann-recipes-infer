model_args:
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  use-cpu-offload: true

model_name: "hunyuan-video"
world_size: 1
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "TaylorSeer"
  enable_separate_cfg: true
  params:
    n_derivatives: 3                 # Taylor expansion order
    skip_interval_steps: 4           # full compute every N steps
    warmup: 3                        # first N steps compute fully
    cutoff_steps: 1                  # last N steps compute fully
    offload: true                    # offload derivative cache to CPU; needs 400GB+ host memory at 720*1280*129
