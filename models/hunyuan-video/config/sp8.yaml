model_args:
  model-base: "ckpts"                # weight root dir; modify if weights are not under models/hunyuan-video/ckpts
  prompt: "A cat walks on the grass, realistic style."
  video-size: [720, 1280]            # [H, W]; supported combos per world_size in README
  video-length: 129                  # frame count; 4k+1 form
  infer-steps: 50                    # denoising steps
  seed: 42
  embedded-cfg-scale: 6.0
  flow-shift: 7.0
  flow-reverse: true
  ulysses-degree: 8                  # Ulysses SP degree; must divide head_num=24 (unless UAA)
  ring-degree: 1                     # Ring Attention SP degree
  use-cpu-offload: false             # enabling slows down VAE; required when TaylorSeer cache is enabled
  use-vae-parallel: true             # multi-card VAE split

model_name: "hunyuan-video"
world_size: 8                        # must equal ulysses-degree * ring-degree
master_port: 29600
entry_script: "sample_video.py"

dit_cache:
  method: "NoCache"                  # [NoCache, FBCache, TeaCache, TaylorSeer]
  enable_separate_cfg: true
  # Uncomment the params block matching the method above; only that block is read.
  # params:
  #   # FBCache:
  #   rel_l1_thresh: 0.05
  #
  #   # TeaCache:
  #   rel_l1_thresh: 0.15
  #   coefficients: [733.226126, -401.131952, 67.5869174, -3.149879, 0.0961237896]
  #   warmup: 2
  #
  #   # TaylorSeer (needs 400GB+ host memory when offload=true at 720*1280*129):
  #   n_derivatives: 3
