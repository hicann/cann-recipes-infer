model_config:
  model_name: "qwen3.5"
  model_path: "/data/models/Qwen3.5-122B-A10B-FP8"
  exe_mode: "eager"      # ["eager", "npugraph_ex"]
  enable_profiler: False # [False, True]
  with_ckpt: True
  enable_cache_compile: False
  packed_sequence: False
  force_eplb: False
  platform_version: "950"
  custom_params:
      # FP8 checkpoints should normally carry quantization_config in config.json.
      # If the checkpoint does not, provide the full config here:
      # quantization: "fp8"
      # quantization_config:
      #   quant_method: "fp8"
      #   activation_scheme: "dynamic"
      #   weight_block_size: [128, 128]
      enable_mm_all_reduce_base: False
      enable_gdn_solve_triangular: False
      enable_decode_moe_dispatch_combine_v2: False

data_config:
  dataset: "default"  # ["default", "LongBench"]
  input_truncated_len: 2048

parallel_config:
  world_size: 4
  attn_tp_size: 4
  moe_tp_size: 4
  embed_tp_size: 4
  lmhead_tp_size: 1
  shared_tp_size: 1

scheduler_config:
  max_new_tokens: 128
  batch_size: 4
