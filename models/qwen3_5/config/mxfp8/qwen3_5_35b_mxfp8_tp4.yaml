model_config:
  model_name: "qwen3.5"
  model_path: "/data/models/Qwen3.5-35B-A3B"
  exe_mode: "eager"      # ["eager", "npugraph_ex"]
  enable_profiler: False # [False, True]
  with_ckpt: True
  enable_cache_compile: False
  force_eplb: False
  custom_params:
      enable_mm_all_reduce_base: False # Only support 950.
      enable_gdn_solve_triangular: False
      # Online MXFP8 converts loaded BF16/FP16 weights after checkpoint loading.
      # It is intentionally configured here instead of relying on checkpoint config.json.
      enable_online_mxfp8_quantization: True
      online_mxfp8_quant_layers:
        - "linear"
        - "gmm"
      online_mxfp8_ignored_layers: ["lm_head"]

data_config:
  dataset: "default"  # ["default", "LongBench"]
  input_truncated_len: 2048

parallel_config:
  world_size: 4
  attn_tp_size: 4
  moe_tp_size: 4
  embed_tp_size: 4
  lmhead_tp_size: 1
  shared_tp_size: 1

scheduler_config:
  max_new_tokens: 128
  batch_size: 4
