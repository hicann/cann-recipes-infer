model_config:
  model_name: "kimi_k2_thinking"
  model_path: "/data/models/Kimi-K2-Thinking"
  with_ckpt: True
  exe_mode: "npugraph_ex"             # ["eager", "npugraph_ex", "ge_graph"]
  next_n: 0
  enable_profiler: False
  force_eplb: False
  enable_static_kernel: True          # npugraph_ex only: compile operators to static kernels
  enable_cache_compile: False
  enable_weight_nz: True
  custom_params:
    enable_mla_prolog: True
    enable_multi_streams: True
    enable_superkernel: False         # ge_graph only

data_config:
  dataset: "InfiniteBench"
  input_truncated_len: 65536

parallel_config:
  world_size: 32
  cp_size: 32
  attn_tp_size: 1
  o_proj_tp_size: 8
  dense_tp_size: 4
  moe_tp_size: 1
  embed_tp_size: 16
  lmhead_tp_size: 16

scheduler_config:
  block_size: 128
  max_prefill_tokens: 65536
  max_new_tokens: 256
  batch_size: 32
