# Canonical EP deployment for LongCat-Flash-Lite (A3 default).
#
# Parallel topology:
#   attn_tp=4, attn_dp=2: MLA TP=4 with DP=2.
#   moe_tp=1, moe_ep=8: MoE expert parallelism.
#   dense_tp=1, embed_tp=1: dense MLP / base embedding DP-replicated.
#   ngram_embed_tp_size=8: ngram sub-tables sharded across all ranks.
#   lmhead_tp=8: LM head TP across all ranks.
#
# A2 deployment: add ``platform_version: "A2"`` below — MC2 dispatch_v2
# (caps experts_per_rank ≤ 24) then auto-falls back to double_routing.
model_config:
  model_name: "longcat_flash_lite"
  model_path: "/data/models/LongCat-Flash-Lite"
  exe_mode: "ge_graph"
  with_ckpt: True
  custom_params:
    ngram_embed_tp_size: 8

parallel_config:
  world_size: 8
  attn_tp_size: 4
  dense_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 8

scheduler_config:
  max_new_tokens: 128
  batch_size: 2

data_config:
  dataset: "default"
  input_truncated_len: 256        # default_prompt.json is ~256 tokens
