model_args:
  ckpt_dir: "/path/to/Wan2.2-I2V-14B"  # must modify: path to downloaded weight directory
  image: "examples/i2v_input.JPG"
  prompt: "Summer beach vacation style, a white cat wearing sunglasses sits on a surfboard."
  task: "i2v-A14B"
  size: "832*480"                    # HxW
  frame_num: 61                      # 4n+1 form
  sample_steps: 40                   # denoising steps
  base_seed: 100
  convert_model_dtype: true
  cfg_size: 1
  ulysses_size: 1
  ring_size: 1

model_name: "wan2.2-i2v"
world_size: 1
master_port: 29600
entry_script: "generate.py"

env_vars:
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  TASK_QUEUE_ENABLE: "2"
  CPU_AFFINITY_CONF: "1"

dit_cache:
  method: "TeaCache"
  enable_separate_cfg: true
  params:
    rel_l1_thresh: 0.1               # accumulated L1 threshold
    coefficients: [733.226126, -401.131952, 67.5869174, -3.149879, 0.0961237896]
    warmup: 2                        # first N steps compute fully
