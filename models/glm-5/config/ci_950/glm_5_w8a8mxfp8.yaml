model_name: "GLM-5"
model_path: "/data/models/GLM-5-W8A8-MXFP8"
exe_mode: "npugraph_ex"          # ["ge_graph", "eager", "npugraph_ex"], mode of decode
world_size: 16

model_config:
  next_n: 3
  pa_block_size: 128
  with_ckpt: True                   # [False, True]
  enable_multi_streams: True        # [False, True]
  enable_profiler: False            # [False, True]
  perfect_eplb: False               # [False, True]
  enable_cache_compile: False       # [False, True]
  enable_online_split_weight: True  # [False, True]
  prefill_mini_batch_size: 1
  platform_version: "950"

data_config:
  dataset: InfiniteBench
  input_max_len: 8192
  max_new_tokens: 256
  batch_size: 16

parallel_config:
  oproj_tp_size: 1
  attn_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 4
