model_config:
  model_name: longcat_flash
  model_path: /data/models/origin/LongCat-Flash-Chat/
  with_ckpt: True                   # [False, True]
  exe_mode: "eager"
  enable_profiler: False            # [False, True]
  force_eplb: False                 # [False, True]
  enable_cache_compile: False       # [False, True]
  next_n: 0
  custom_params:
    moe_chunk_max_len: 1024

data_config:
  input_truncated_len: 400
  dataset: default

parallel_config:
  world_size: 32
  attn_tp_size: 1
  dense_tp_size: 8
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 1
  o_proj_tp_size: 1

scheduler_config:
  block_size: 128
  max_new_tokens: 128
  max_prefill_tokens: 400
  batch_size: 64
