  cp_size: 1
  attn_tp_size: 1
  dense_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 4
  o_proj_tp_size: 1

scheduler_config:
  block_size: 128
  max_new_tokens: 1
  max_prefill_tokens: 8192
  batch_size: 16
  mem_fraction_static: 0.80
