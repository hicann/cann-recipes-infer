model_config:
  model_name: "deepseek_v4"
  model_path: "/data/models/deepseek_v4_int8_w8a8"
  platform_version: "A3"
  with_ckpt: True
  exe_mode: "eager"
  enable_static_kernel: False
  enable_dynamic_graph: False
  enable_profiler: False
  force_eplb: False
  enable_cache_compile: False
  custom_params:
    enable_multi_streams: False
    enable_pypto: False
    enable_limit_core: False
    moe_chunk_max_len: 65536

data_config:
  temperature: 1.0

parallel_config:
