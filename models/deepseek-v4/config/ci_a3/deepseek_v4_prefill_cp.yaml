model_name: "deepseek_v4"
model_path: "/data/models/deepseek_v4_int8_w8a8"
exe_mode: "npugraph_ex"          # ["npugraph_ex", "eager"], mode of decode
world_size: 128                  # world_size = 2 * chip_num in A3

model_config:
  next_n: 1
  pa_block_size: 128
  with_ckpt: True                   # [False, True]
  enable_multi_streams: True        # [False, True]
  enable_profiler: False            # [False, True]
  perfect_eplb: False               # [False, True]
  enable_cache_compile: False       # [False, True]
  enable_online_split_weight: True  # [False, True]
  prefill_mini_batch_size: 1
  enable_static_kernel: True        # [False, True]
  enable_limit_core: True           # [False, True]
  moe_chunk_max_len: 1024

data_config:
  dataset: InfiniteBench
  input_max_len: 131072
  max_new_tokens: 256
  batch_size: 256
  temperature: 1.0

parallel_config:
  cp_size: 128
  oproj_tp_size: 1
  attn_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 1
  lmhead_tp_size: 4
