model_name: "deepseek_v2_lite"  # keep it for backward compatibility.
world_size: 8  # keep it for backward compatibility.

model_config:
  model_name: "deepseek_v2_lite"
  model_path: "/data/models/origin/DeepSeek-V2-Lite/"
  with_ckpt: True                   # [False, True]
  exe_mode: "ge_graph"              # ["eager", "npugraph_ex", "ge_graph"]
  enable_profiler: True             # [False, True]
  force_eplb: False                 # [False, True]
  enable_cache_compile: False       # [False, True]
  custom_params:
    enable_weight_nz: False           # [False, True]
    enable_mla_prolog: False          # [False, True]
    enable_multi_streams: True        # [False, True]
    enable_superkernel: False         # [False, True]
    moe_chunk_max_len: 65536
    micro_batch_mode: 0               # [0, 1]

data_config:
  dataset: "default"  # ["default", "LongBench", "InfiniteBench"]
  input_truncated_len: 32

parallel_config:
  world_size: 8
  attn_tp_size: 1
  dense_tp_size: 1
  moe_tp_size: 1
  embed_tp_size: 8
  lmhead_tp_size: 8

scheduler_config:
  block_size: 128
  max_new_tokens: 100
  batch_size: 64
