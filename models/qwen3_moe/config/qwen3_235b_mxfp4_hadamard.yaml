model_config:
  model_name: "qwen3_moe"
  model_path: "/data/models/Qwen3-235B-A22B-W4A4-Hadamard"
  exe_mode: "eager"        # ["eager", "npugraph_ex", "ge_graph"]
  enable_profiler: False  # [False, True]
  with_ckpt: True # [False, True]
  enable_cache_compile: False # [False, True]
  force_eplb: False
  platform_version: "950"
  enable_hadamard: True
  hadamard_weight_path: "/data/models/quant_params_attn-linear_4_24"

data_config:
  dataset: "LongBench"
  input_truncated_len: 4096

parallel_config:
  world_size: 4
  attn_tp_size: 4 # attn_dp_size = world_size // attn_tp_size
  moe_tp_size: 1 # moe_ep_size = world_size // moe_tp_size
  embed_tp_size: 1
  lmhead_tp_size: 1

scheduler_config:
  max_new_tokens: 256
  batch_size: 1  # global batch_size
